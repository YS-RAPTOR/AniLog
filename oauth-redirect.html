<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>AniLog Sign-In Redirect</title>
        <style>
            :root {
                color-scheme: light dark;
                --background: oklch(1 0 0);
                --foreground: oklch(0.141 0.005 285.823);
                --muted-foreground: oklch(0.552 0.016 285.938);
                --accent: oklch(0.6 0.1 185);
                --accent-foreground: oklch(0.98 0.01 181);
                --destructive: oklch(0.577 0.245 27.325);
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --background: oklch(0.141 0.005 285.823);
                    --foreground: oklch(0.985 0 0);
                    --muted-foreground: oklch(0.705 0.015 286.067);
                    --accent: oklch(0.7 0.12 183);
                    --accent-foreground: oklch(0.28 0.04 193);
                    --destructive: oklch(0.704 0.191 22.216);
                }
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
                font-family:
                    "Inter Variable",
                    Inter,
                    "Segoe UI",
                    "Helvetica Neue",
                    Helvetica,
                    Arial,
                    sans-serif;
                color: var(--foreground);
                background: var(--background);
                position: relative;
            }

            /* Screentone dot background */
            .dot-bg {
                position: fixed;
                inset: 0;
                z-index: 0;
                opacity: 0.04;
                pointer-events: none;
                background-image: radial-gradient(
                    circle,
                    currentColor 1px,
                    transparent 1px
                );
                background-size: 4px 4px;
            }

            @media (prefers-color-scheme: dark) {
                .dot-bg {
                    opacity: 0.06;
                }
            }

            .dot-overlay {
                position: fixed;
                inset: 0;
                z-index: 0;
                background: var(--background);
                opacity: 0.9;
                pointer-events: none;
            }

            /* Top animated bar */
            .top-bar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 6px;
                background: linear-gradient(
                    90deg,
                    var(--muted-foreground),
                    var(--foreground),
                    var(--muted-foreground)
                );
                background-size: 100% 100%;
                animation: pulse 2s ease-in-out infinite;
                z-index: 20;
            }

            /* Page container */
            .page {
                position: relative;
                z-index: 10;
                max-width: 72rem;
                margin: 0 auto;
                padding: 2.5rem 1rem 2.5rem;
                animation: fadein 500ms ease-out;
            }

            @media (min-width: 768px) {
                .page {
                    padding: 3.5rem 2rem 3.5rem;
                }
            }

            /* Header */
            header {
                margin-bottom: 2.5rem;
            }

            @media (min-width: 768px) {
                header {
                    margin-bottom: 3rem;
                }
            }

            header h1 {
                font-size: clamp(2rem, 4vw + 1rem, 3.75rem);
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: -0.025em;
                line-height: 1;
            }

            header .subtitle {
                margin-top: 1rem;
                border-left: 4px solid var(--foreground);
                padding-left: 1rem;
                font-size: 1rem;
                font-weight: 500;
                color: var(--muted-foreground);
            }

            @media (min-width: 768px) {
                header .subtitle {
                    font-size: 1.125rem;
                }
            }

            /* Card area */
            .card-area {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding-top: 2rem;
            }

            @media (min-width: 768px) {
                .card-area {
                    padding-top: 4rem;
                }
            }

            /* Card with offset shadow */
            .card-wrapper {
                position: relative;
                isolation: isolate;
                width: 100%;
                max-width: 36rem;
            }

            .card-wrapper::after {
                content: "";
                position: absolute;
                inset: 0;
                transform: translate(8px, 8px);
                background: var(--foreground);
                z-index: -1;
            }

            .card {
                position: relative;
                border: 4px solid var(--foreground);
                background: var(--background);
                padding: 2rem;
                text-align: center;
                overflow: hidden;
            }

            @media (min-width: 768px) {
                .card {
                    padding: 3rem;
                }
            }

            .card-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2rem;
            }

            .card-text {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }

            .card-text h2 {
                font-size: 1.875rem;
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: -0.025em;
            }

            .card-text p {
                color: var(--muted-foreground);
                font-weight: 500;
                max-width: 24rem;
                margin: 0 auto;
                line-height: 1.5;
            }

            /* Error block */
            .error-block {
                width: 100%;
                padding: 1rem;
                color: var(--destructive);
                background: oklch(0.577 0.245 27.325 / 0.1);
                border: 2px solid var(--destructive);
                font-weight: 700;
                font-size: 0.875rem;
            }

            /* Button */
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                height: 2.75rem;
                min-width: 240px;
                padding: 0 1.5rem;
                border: none;
                border-radius: 0;
                background: var(--foreground);
                color: var(--background);
                font-family: inherit;
                font-size: 0.875rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                text-decoration: none;
                cursor: pointer;
                transition: opacity 150ms ease;
            }

            .btn:hover {
                opacity: 0.85;
            }

            .hidden {
                display: none;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.6;
                }
            }

            @keyframes fadein {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <div class="dot-bg" aria-hidden="true"></div>
        <div class="dot-overlay" aria-hidden="true"></div>
        <div class="top-bar" aria-hidden="true"></div>

        <div class="page">
            <header>
                <h1>Google Login</h1>
                <p class="subtitle">
                    Completing your Google sign-in for AniLog.
                </p>
            </header>

            <div class="card-area">
                <div class="card-wrapper">
                    <div class="card">
                        <div class="card-content">
                            <div class="card-text">
                                <h2 id="heading">Completing Sign-In</h2>
                                <p id="status">
                                    Trying to open AniLog now. Please wait...
                                </p>
                            </div>

                            <p id="error" class="error-block hidden"></p>

                            <div id="manual" class="hidden">
                                <a id="openApp" class="btn" href="#"
                                    >Open AniLog</a
                                >
                            </div>
                        </div>
                    </div>
                </div>

                <p
                    style="
                        margin-top: 3rem;
                        font-size: 0.75rem;
                        font-weight: 700;
                        text-transform: uppercase;
                        letter-spacing: 0.2em;
                        color: var(--muted-foreground);
                    "
                >
                    If AniLog opens, you can close this tab.
                </p>
            </div>
        </div>

        <script>
            (function () {
                const callbackBase = "anilog://oauth/google/callback";
                const status = document.getElementById("status");
                const heading = document.getElementById("heading");
                const manual = document.getElementById("manual");
                const openApp = document.getElementById("openApp");
                const errorText = document.getElementById("error");

                const incoming = new URL(window.location.href);
                const query = incoming.search || "";
                const hash = incoming.hash || "";
                const callbackUrl = callbackBase + query + hash;

                openApp.href = callbackUrl;

                const oauthError = incoming.searchParams.get("error");
                if (oauthError) {
                    heading.textContent = "Authentication Error";
                    status.textContent =
                        "Google returned an authentication error.";
                    errorText.textContent = "Error: " + oauthError;
                    errorText.classList.remove("hidden");
                    manual.classList.remove("hidden");
                    return;
                }

                window.location.assign(callbackUrl);

                window.setTimeout(function () {
                    status.textContent =
                        "If the app did not open, use the button below.";
                    manual.classList.remove("hidden");
                }, 900);
            })();
        </script>
    </body>
</html>
