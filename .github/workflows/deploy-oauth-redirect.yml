name: Deploy OAuth Redirect Page

on:
    push:
        branches: ["main"]
        paths:
            - "oauth-redirect.html"
            - ".github/workflows/deploy-oauth-redirect.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Prepare static site artifact
              run: mkdir -p _site/oauth/google/callback && cp oauth-redirect.html _site/oauth/google/callback/index.html

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: _site

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
